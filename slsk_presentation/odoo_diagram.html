<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLSK Ventures — Odoo ERP Architecture</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080D1A; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; user-select:none; }
svg { display:block; }
@keyframes flow { to { stroke-dashoffset:-32; } }
.panel {
  position:fixed;
  background:rgba(8,13,26,0.92);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:13px;
}
#title-bar { top:20px; left:20px; padding:13px 18px; pointer-events:none; }
#title-bar h1 { font-size:16px; font-weight:700; color:#fff; letter-spacing:-0.03em; }
#title-bar p  { font-size:10px; color:rgba(255,255,255,0.28); letter-spacing:0.12em; text-transform:uppercase; margin-top:3px; }
#hint { top:20px; right:20px; padding:8px 13px; font-size:10px; color:rgba(255,255,255,0.22); line-height:2; text-align:right; pointer-events:none; }
#legend { bottom:20px; left:20px; padding:12px 15px; }
#legend h4 { font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.22); margin-bottom:9px; }
.leg-row { display:flex; align-items:center; gap:8px; font-size:11px; color:rgba(255,255,255,0.55); margin-bottom:5px; }
.leg-row:last-child { margin-bottom:0; }
.swatch { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
#conn-key { bottom:20px; right:20px; padding:11px 15px; pointer-events:none; }
#conn-key h4 { font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.22); margin-bottom:9px; }
.ck-row { display:flex; align-items:center; gap:10px; font-size:11px; color:rgba(255,255,255,0.45); margin-bottom:5px; }
.ck-row:last-child { margin-bottom:0; }
.ck-solid { width:28px; height:2px; background:rgba(255,255,255,0.35); position:relative; }
.ck-dashed { width:28px; height:0; border-top:2px dashed rgba(255,255,255,0.3); }
#tooltip {
  position:fixed; pointer-events:none; z-index:9999; opacity:0; transition:opacity .12s;
  background:rgba(8,13,26,0.97); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1); border-radius:11px;
  padding:13px 16px; max-width:240px; box-shadow:0 16px 48px rgba(0,0,0,0.6);
}
#tooltip.show { opacity:1; }
#tt-badge { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:5px; }
#tt-name  { font-size:13px; font-weight:700; color:#fff; margin-bottom:5px; }
#tt-desc  { font-size:11px; color:rgba(255,255,255,0.5); line-height:1.55; }
</style>
</head>
<body>

<svg id="svg" style="width:100vw;height:100vh;cursor:grab;">
  <defs id="defs">
    <pattern id="dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="rgba(255,255,255,0.035)"/>
    </pattern>
  </defs>
  <!-- background fills -->
  <rect id="bg1" x="0" y="0" width="100%" height="100%" fill="#080D1A"/>
  <rect id="bg2" x="0" y="0" width="100%" height="100%" fill="url(#dots)"/>
  <!-- main canvas group — zoom/pan via transform -->
  <g id="canvas">
    <g id="glows"></g>
    <g id="zone-labels"></g>
    <g id="node-layer"></g>
    <g id="conn-layer"></g>
  </g>
</svg>

<!-- HTML overlay panels -->
<div class="panel" id="title-bar">
  <h1>SLSK Ventures — Odoo ERP</h1>
  <p>Module Architecture · Ref: CalibtOS-SLSK-2026-001</p>
</div>
<div class="panel" id="hint">Scroll to zoom · Drag to pan<br>Hover to trace connections</div>
<div class="panel" id="legend"><h4>Categories</h4></div>
<div class="panel" id="conn-key">
  <h4>Connection Types</h4>
  <div class="ck-row"><div class="ck-solid"></div> Document / data flow</div>
  <div class="ck-row"><div class="ck-dashed"></div> Trigger / signal</div>
</div>
<div id="tooltip">
  <div id="tt-badge"></div>
  <div id="tt-name"></div>
  <div id="tt-desc"></div>
</div>

<script>
(function() {
'use strict';

// ─── Palette ──────────────────────────────────────────────────────────────────
var CATS = {
  external:      { label: 'External Systems',       color: '#64748B' },
  core:          { label: 'Core / Base',             color: '#94A3B8' },
  sales:         { label: 'Sales & Amazon',          color: '#3B82F6' },
  purchase:      { label: 'Purchase',                color: '#F97316' },
  inventory:     { label: 'Inventory & Warehouse',   color: '#10B981' },
  manufacturing: { label: 'Manufacturing & Quality', color: '#8B5CF6' },
  accounting:    { label: 'Accounting & Finance',    color: '#EF4444' }
};

// ─── Modules (cx, cy = centre of card) ───────────────────────────────────────
//
//  Layout grid (canvas ~1140 × 650):
//
//  col:      90      330      570      820     1060
//  row 110:  [AmazonExt] [AmazonConn] [Sales] [Contacts] [Discuss]
//  row ~310:  [SuppExt]   [Purchase]   (Landed C shifted down-left) [Inventory][Accounting]
//  row 490:                   [Manufacturing]  [Quality]
//  row 620:    [BoM]          [UoM]    [WorkCenters]
//
var MODS = [
  // ── External entities ──────────────────────────────────────────────────────
  { id:'amazon_ext',      cat:'external',      cx: 90,  cy:110, w:150, h:70, external:true,
    name:'Amazon\n10 EU Marketplaces',
    desc:'SLSK\'s 10 active Amazon storefronts: DE, FR, UK, IT, ES, NL, BE, SE, IE, PL — connected via SP-API' },
  { id:'suppliers_ext',   cat:'external',      cx: 90,  cy:375, w:150, h:60, external:true,
    name:'Suppliers\nSeeds + Packaging',
    desc:'Italian organic seed suppliers (kg + seed-count units) and Asian packaging suppliers with variable lead times' },

  // ── Sales & Amazon ─────────────────────────────────────────────────────────
  { id:'amazon_connector',cat:'sales',         cx:330,  cy:110, w:162, h:54, big:true,
    name:'Amazon Connector',
    desc:'Syncs orders, inventory levels & settlement reports across all 10 EU marketplaces via Amazon SP-API' },
  { id:'sales',           cat:'sales',         cx:570,  cy:110, w:142, h:46,
    name:'Sales',
    desc:'Processes inbound Amazon orders; triggers delivery orders and customer invoices automatically' },

  // ── Core / Base ────────────────────────────────────────────────────────────
  { id:'contacts',        cat:'core',          cx:820,  cy:110, w:144, h:46,
    name:'Contacts',
    desc:'res.partner master record: Amazon seller accounts, organic seed suppliers, 3PL contact — shared across every Odoo module' },
  { id:'discuss',         cat:'core',          cx:1060, cy:110, w:134, h:44,
    name:'Discuss',
    desc:'Internal chat & automated notifications: QC failure alerts, reorder triggers, PO approval requests — keeps 4-6 person team in sync' },

  // ── Purchase ───────────────────────────────────────────────────────────────
  { id:'purchase',        cat:'purchase',      cx:330,  cy:365, w:162, h:54, big:true,
    name:'Purchase',
    desc:'Demand-driven POs for raw seeds (kg) and packaging (Asia); goods receipt; reorder triggers from Inventory' },

  // ── Inventory & Landed Costs (offset from sales column so diagonal hub edges stay readable) ──
  { id:'landed_costs',    cat:'inventory',     cx:448,  cy:332, w:148, h:44,
    name:'Landed Costs',
    desc:'Allocates Asia import freight, customs duty and insurance to each SKU\'s unit cost — essential for accurate COGS on packaging shipments' },
  { id:'inventory',       cat:'inventory',     cx:798,  cy:288, w:164, h:56, big:true,
    name:'Inventory',
    desc:'Central stock hub: 3PL virtual locations, FBA positions across 10 markets, lot/batch tracking, reorder rules & organic traceability (EU 2018/848)' },

  // ── Accounting ─────────────────────────────────────────────────────────────
  { id:'accounting',      cat:'accounting',    cx:1060, cy:300, w:162, h:54, big:true,
    name:'Accounting',
    desc:'Amazon settlement reconciliation for all 10 accounts; COGS per SKU; EU VAT/OSS; multi-currency (EUR, GBP, SEK, PLN)' },

  // ── Manufacturing cluster ──────────────────────────────────────────────────
  { id:'manufacturing',   cat:'manufacturing', cx:530,  cy:490, w:164, h:54, big:true,
    name:'Manufacturing',
    desc:'3PL packing runs as Manufacturing Orders; tracks seed kg consumed, units produced, yield loss and waste per BoM' },
  { id:'quality',         cat:'manufacturing', cx:820,  cy:490, w:154, h:46,
    name:'Quality Control',
    desc:'4 QC checkpoints: supplier receipt, pre-packing, post-packing, FBA inbound — replaces sense-check with pass/fail criteria' },

  // ── Manufacturing sub-modules ──────────────────────────────────────────────
  { id:'bom',             cat:'manufacturing', cx:285,  cy:620, w:150, h:44,
    name:'Bill of Materials',
    desc:'RM (seed kg) + PM (packaging) + M (packing labour) recipe per SKU — 3 classes, 3 size variants per species' },
  { id:'uom',             cat:'manufacturing', cx:530,  cy:620, w:150, h:44,
    name:'Units of Measure',
    desc:'Converts between kg, individual seed count and consumer pack units — solves SLSK\'s 3-dimensional UoM problem' },
  { id:'workcenters',     cat:'manufacturing', cx:780,  cy:620, w:156, h:44,
    name:'Work Centers (3PL)',
    desc:'3PL assembler modelled as Odoo Work Center with throughput targets, packing error rate tracking and SLA metrics' }
];

// ─── Connections ──────────────────────────────────────────────────────────────
var CONNS = [
  { from:'amazon_ext',      to:'amazon_connector', style:'dashed', label:'SP-API' },
  { from:'suppliers_ext',   to:'purchase',         style:'dashed', label:'PO / delivery' },
  { from:'amazon_connector',to:'sales',            style:'solid',  label:'orders' },
  { from:'amazon_connector',to:'inventory',        style:'solid',  label:'stock sync' },
  { from:'amazon_connector',to:'accounting',       style:'solid',  label:'settlements' },
  { from:'sales',           to:'inventory',        style:'solid',  label:'delivery order' },
  { from:'sales',           to:'accounting',       style:'solid',  label:'invoice' },
  { from:'purchase',        to:'inventory',        style:'solid',  label:'goods receipt' },
  { from:'purchase',        to:'accounting',       style:'solid',  label:'vendor bill' },
  { from:'inventory',       to:'purchase',         style:'dashed', label:'reorder trigger' },
  { from:'inventory',       to:'manufacturing',    style:'solid',  label:'components' },
  { from:'manufacturing',   to:'inventory',        style:'solid',  label:'finished goods' },
  { from:'inventory',       to:'accounting',       style:'solid',  label:'stock valuation' },
  { from:'bom',             to:'manufacturing',    style:'solid',  label:'recipe' },
  { from:'uom',             to:'bom',              style:'solid',  label:'conversions' },
  { from:'workcenters',     to:'manufacturing',    style:'solid',  label:'3PL capacity' },
  { from:'quality',         to:'manufacturing',    style:'dashed', label:'QC checkpoints' },
  { from:'quality',         to:'inventory',        style:'dashed', label:'lot / batch track' },

  // Contacts (partner master)
  { from:'amazon_connector',to:'contacts',         style:'solid',  label:'customer master' },
  { from:'purchase',        to:'contacts',         style:'solid',  label:'vendor master' },
  { from:'contacts',        to:'accounting',       style:'dashed', label:'invoice partner' },

  // Landed Costs
  { from:'purchase',        to:'landed_costs',     style:'dashed', label:'freight / duty' },
  { from:'landed_costs',    to:'inventory',        style:'solid',  label:'unit cost adjust' },
  { from:'landed_costs',    to:'accounting',       style:'solid',  label:'journal entry' },

  // Discuss notifications
  { from:'quality',         to:'discuss',          style:'dashed', label:'QC alerts' },
  { from:'inventory',       to:'discuss',          style:'dashed', label:'reorder alerts' },
  { from:'purchase',        to:'discuss',          style:'dashed', label:'PO approvals' }
];

// ─── SVG namespace helper ─────────────────────────────────────────────────────
var SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  var el = document.createElementNS(SVG_NS, tag);
  if (attrs) {
    for (var k in attrs) {
      if (Object.prototype.hasOwnProperty.call(attrs, k)) {
        el.setAttribute(k, attrs[k]);
      }
    }
  }
  return el;
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

function rgba(hex, a) {
  var rgb = hexToRgb(hex);
  return 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + a + ')';
}

// ─── Quadratic Bézier arc path between two points ────────────────────────────
function arcPath(x1, y1, x2, y2, bias) {
  bias = bias || 0.12;
  var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  var dx = x2 - x1, dy = y2 - y1;
  var L = Math.sqrt(dx * dx + dy * dy) || 1;
  var k = Math.min(L * bias, 50);
  var cpx = mx - (dy / L) * k;
  var cpy = my + (dx / L) * k;
  return 'M' + x1 + ',' + y1 + ' Q' + cpx + ',' + cpy + ' ' + x2 + ',' + y2;
}

// ─── Edge exit point from node rectangle toward a target ─────────────────────
function edgePt(mod, tx, ty) {
  var hw = mod.w / 2 + 4, hh = mod.h / 2 + 4;
  var dx = tx - mod.cx, dy = ty - mod.cy;
  var L = Math.sqrt(dx * dx + dy * dy) || 1;
  var sx = dx === 0 ? 1e9 : Math.abs(hw / dx);
  var sy = dy === 0 ? 1e9 : Math.abs(hh / dy);
  var s = Math.min(sx, sy);
  return { x: mod.cx + dx * s, y: mod.cy + dy * s };
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────
var mainSvg    = document.getElementById('svg');
var defs       = document.getElementById('defs');
var canvasGrp  = document.getElementById('canvas');
var glowsGrp   = document.getElementById('glows');
var zlabelGrp  = document.getElementById('zone-labels');
var connGrp    = document.getElementById('conn-layer');
var nodeGrp    = document.getElementById('node-layer');
var tooltip    = document.getElementById('tooltip');
var ttBadge    = document.getElementById('tt-badge');
var ttName     = document.getElementById('tt-name');
var ttDesc     = document.getElementById('tt-desc');

// ─── Build module map ─────────────────────────────────────────────────────────
var modMap = {};
for (var i = 0; i < MODS.length; i++) {
  modMap[MODS[i].id] = MODS[i];
}

// ─── Arrow markers per category ───────────────────────────────────────────────
for (var catId in CATS) {
  if (!Object.prototype.hasOwnProperty.call(CATS, catId)) continue;
  var catColor = CATS[catId].color;
  var mkr = svgEl('marker', {
    id: 'arr-' + catId,
    markerWidth: '8', markerHeight: '8',
    refX: '6', refY: '3',
    orient: 'auto', markerUnits: 'strokeWidth'
  });
  var arrowPath = svgEl('path', { d: 'M0,0 L0,6 L8,3 z', fill: catColor });
  mkr.appendChild(arrowPath);
  defs.appendChild(mkr);

  // lit version (same color, used on hover)
  var mkrLit = svgEl('marker', {
    id: 'arr-lit-' + catId,
    markerWidth: '8', markerHeight: '8',
    refX: '6', refY: '3',
    orient: 'auto', markerUnits: 'strokeWidth'
  });
  var arrowPathLit = svgEl('path', { d: 'M0,0 L0,6 L8,3 z', fill: catColor });
  mkrLit.appendChild(arrowPathLit);
  defs.appendChild(mkrLit);
}

// ─── Ambient glow blobs ───────────────────────────────────────────────────────
var glowBlobs = [
  { cx: 798, cy: 288, rx: 300, ry: 140, color: '#10B981' },   // inventory hub
  { cx: 530, cy: 510, rx: 260, ry: 130, color: '#8B5CF6' },   // manufacturing
  { cx:1060, cy: 300, rx: 215, ry: 120, color: '#EF4444' },   // accounting
  { cx: 330, cy: 110, rx: 195, ry: 75,  color: '#3B82F6' },   // amazon connector
  { cx: 940, cy: 110, rx: 220, ry: 65,  color: '#94A3B8' }    // core/base (contacts+discuss)
];

for (var gi = 0; gi < glowBlobs.length; gi++) {
  var gb = glowBlobs[gi];
  var gid = 'glow' + gi;
  var radGrad = svgEl('radialGradient', { id: gid, cx: '50%', cy: '50%', r: '50%' });
  var stop0 = svgEl('stop', { offset: '0%' });
  stop0.setAttribute('stop-color', rgba(gb.color, 0.08));
  var stop1 = svgEl('stop', { offset: '100%' });
  stop1.setAttribute('stop-color', rgba(gb.color, 0));
  radGrad.appendChild(stop0);
  radGrad.appendChild(stop1);
  defs.appendChild(radGrad);

  var ell = svgEl('ellipse', { cx: gb.cx, cy: gb.cy, rx: gb.rx, ry: gb.ry, fill: 'url(#' + gid + ')' });
  glowsGrp.appendChild(ell);
}

// ─── Zone labels ──────────────────────────────────────────────────────────────
var zoneLabels = [
  { text: 'AMAZON INTEGRATION', x: 148, y: 62,  color: '#3B82F6' },
  { text: 'PROCUREMENT',         x: 155, y: 320, color: '#F97316' },
  { text: 'OPERATIONS HUB',      x: 598, y: 228, color: '#10B981' },
  { text: 'MANUFACTURING & QC',  x: 210, y: 443, color: '#8B5CF6' },
  { text: 'FINANCE',             x: 985, y: 242, color: '#EF4444' },
  { text: 'CORE / BASE',         x: 748, y: 62,  color: '#94A3B8' }
];

for (var zi = 0; zi < zoneLabels.length; zi++) {
  var zl = zoneLabels[zi];
  var zt = svgEl('text', {
    x: zl.x, y: zl.y,
    'font-family': "'Segoe UI',system-ui,sans-serif",
    'font-size': '8', 'font-weight': '700', 'letter-spacing': '0.16em',
    fill: rgba(zl.color, 0.5),
    'pointer-events': 'none'
  });
  zt.textContent = zl.text;
  zlabelGrp.appendChild(zt);
}

// ─── Build connections ────────────────────────────────────────────────────────
var connEls = [];  // { path, labelEl, from, to, catId, color, isDash }

for (var ci = 0; ci < CONNS.length; ci++) {
  var conn = CONNS[ci];
  var fm = modMap[conn.from];
  var tm = modMap[conn.to];
  if (!fm || !tm) continue;

  var fcat = CATS[fm.cat];
  var col = fcat.color;
  var isDash = conn.style === 'dashed' || fm.external;

  var p1 = edgePt(fm, tm.cx, tm.cy);
  var p2 = edgePt(tm, fm.cx, fm.cy);

  var pathEl = svgEl('path', {
    d: arcPath(p1.x, p1.y, p2.x, p2.y),
    fill: 'none',
    stroke: col,
    'stroke-width': '1.7',
    'stroke-opacity': fm.external ? '0.3' : '0.5',
    'marker-end': 'url(#arr-' + fm.cat + ')'
  });
  if (isDash) pathEl.setAttribute('stroke-dasharray', '6 4');
  connGrp.appendChild(pathEl);

  // Label
  var labelEl = null;
  if (conn.label) {
    var mx2 = (p1.x + p2.x) / 2, my2 = (p1.y + p2.y) / 2;
    var ddx = p2.x - p1.x, ddy = p2.y - p1.y;
    var LL = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
    var lx = mx2 - (ddy / LL) * 18, ly = my2 + (ddx / LL) * 18;
    labelEl = svgEl('text', {
      x: lx, y: ly,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-family': "'Segoe UI',system-ui,sans-serif",
      'font-size': '8.5', 'font-weight': '600',
      fill: rgba(col, 0.55),
      'pointer-events': 'none',
      'class': 'conn-label'
    });
    labelEl.textContent = conn.label;
    connGrp.appendChild(labelEl);
  }

  connEls.push({ path: pathEl, labelEl: labelEl, from: conn.from, to: conn.to, catId: fm.cat, color: col, isDash: isDash, isExternal: !!fm.external });
}

// ─── Build nodes ─────────────────────────────────────────────────────────────
var nodeEls = {};  // id -> { grp, bg, lbl }

for (var ni = 0; ni < MODS.length; ni++) {
  var mod = MODS[ni];
  var cat = CATS[mod.cat];
  var col2 = cat.color;
  var hw = mod.w / 2, hh2 = mod.h / 2;

  var grp = svgEl('g', { 'data-id': mod.id });
  grp.setAttribute('transform', 'translate(' + mod.cx + ',' + mod.cy + ')');
  grp.style.cursor = 'pointer';

  if (mod.external) {
    // Dashed-border external entity card
    var extRect = svgEl('rect', {
      x: -hw, y: -hh2, width: mod.w, height: mod.h,
      rx: '10', ry: '10',
      fill: rgba(col2, 0.07),
      stroke: col2, 'stroke-width': '1', 'stroke-dasharray': '4 3',
      'stroke-opacity': '0.4'
    });
    grp.appendChild(extRect);

    // Multi-line text (split on \n)
    var lines2 = mod.name.split('\n');
    var lineH = 15;
    var startY = lines2.length > 1 ? -(lineH * (lines2.length - 1)) / 2 : 0;
    for (var li = 0; li < lines2.length; li++) {
      var lt = svgEl('text', {
        x: '0', y: startY + li * lineH,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-family': "'Segoe UI',system-ui,sans-serif",
        'font-size': li === 0 ? '10.5' : '9.5',
        'font-weight': li === 0 ? '700' : '500',
        fill: rgba(col2, 0.8),
        'pointer-events': 'none'
      });
      lt.textContent = lines2[li];
      grp.appendChild(lt);
    }

    nodeGrp.appendChild(grp);

  } else {
    // Odoo module card

    // Optional outer glow ring for "big" nodes
    if (mod.big) {
      var outerRect = svgEl('rect', {
        x: -(hw + 8), y: -(hh2 + 8), width: mod.w + 16, height: mod.h + 16,
        rx: '20', ry: '20',
        fill: rgba(col2, 0.1), stroke: 'none'
      });
      grp.appendChild(outerRect);
    }

    // Main card background
    var bgRect = svgEl('rect', {
      x: -hw, y: -hh2, width: mod.w, height: mod.h,
      rx: mod.big ? '13' : '10', ry: mod.big ? '13' : '10',
      fill: rgba(col2, 0.18),
      stroke: col2,
      'stroke-width': mod.big ? '1.8' : '1.3',
      'stroke-opacity': mod.big ? '0.75' : '0.5'
    });
    grp.appendChild(bgRect);

    // Left accent bar
    var accentBar = svgEl('rect', {
      x: -hw + 1, y: -hh2 + 7, width: '3.5', height: mod.h - 14,
      rx: '1.75', ry: '1.75',
      fill: col2, 'fill-opacity': '0.9',
      'pointer-events': 'none'
    });
    grp.appendChild(accentBar);

    // Module name label
    var lblEl = svgEl('text', {
      x: '5', y: '0.5',
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-family': "'Segoe UI',system-ui,sans-serif",
      'font-size': mod.big ? '12.5' : '11.5',
      'font-weight': mod.big ? '700' : '600',
      fill: '#ffffff', 'fill-opacity': '0.92',
      'pointer-events': 'none'
    });
    lblEl.textContent = mod.name;
    grp.appendChild(lblEl);

    nodeGrp.appendChild(grp);
    nodeEls[mod.id] = { grp: grp, bg: bgRect, lbl: lblEl };
  }

  // Hover events
  (function(modId) {
    grp.addEventListener('mouseenter', function(e) { onHover(modId, e); });
    grp.addEventListener('mouseleave', offHover);
    grp.addEventListener('mousemove', posTooltip);
  })(mod.id);
}

// ─── Hover interactions ───────────────────────────────────────────────────────
function onHover(id, e) {
  var linked = {};
  linked[id] = true;
  var litConns = [];

  for (var i = 0; i < connEls.length; i++) {
    var c = connEls[i];
    if (c.from === id || c.to === id) {
      linked[c.from] = true;
      linked[c.to] = true;
      litConns.push(c);
    }
  }

  // Dim/highlight nodes
  for (var nid in nodeEls) {
    if (!Object.prototype.hasOwnProperty.call(nodeEls, nid)) continue;
    var ne = nodeEls[nid];
    var nm = modMap[nid];
    var isMain = nid === id;
    var isLinked = !!linked[nid];

    ne.bg.setAttribute('fill-opacity', isMain ? '0.5' : isLinked ? '0.28' : '0.04');
    ne.bg.setAttribute('stroke-opacity', isLinked ? '1' : '0.08');
    ne.lbl.setAttribute('fill-opacity', isLinked ? '1' : '0.1');
  }

  // Dim conn labels
  var allLabels = connGrp.querySelectorAll('.conn-label');
  for (var li = 0; li < allLabels.length; li++) {
    allLabels[li].setAttribute('opacity', '0.08');
  }

  // Highlight lit connections
  for (var i2 = 0; i2 < connEls.length; i2++) {
    var c2 = connEls[i2];
    var isLit = false;
    for (var j = 0; j < litConns.length; j++) {
      if (litConns[j] === c2) { isLit = true; break; }
    }
    if (isLit) {
      c2.path.setAttribute('stroke-opacity', '1');
      c2.path.setAttribute('stroke-width', '2.8');
      c2.path.setAttribute('stroke-dasharray', '10 6');
      c2.path.style.animation = 'flow 0.85s linear infinite';
      if (c2.labelEl) c2.labelEl.setAttribute('opacity', '1');
    } else {
      c2.path.setAttribute('stroke-opacity', '0.04');
      c2.path.setAttribute('stroke-width', '1');
      c2.path.style.animation = '';
    }
  }

  // Tooltip
  var mod = modMap[id];
  var cat = CATS[mod.cat];
  ttBadge.textContent = cat.label;
  ttBadge.style.color = cat.color;
  ttName.textContent = mod.name.replace('\n', ' ');
  ttDesc.textContent = mod.desc;
  tooltip.classList.add('show');
  posTooltip(e);
}

function offHover() {
  for (var nid in nodeEls) {
    if (!Object.prototype.hasOwnProperty.call(nodeEls, nid)) continue;
    var ne = nodeEls[nid];
    var nm = modMap[nid];
    ne.bg.setAttribute('fill-opacity', '0.18');
    ne.bg.setAttribute('stroke-opacity', nm.big ? '0.75' : '0.5');
    ne.lbl.setAttribute('fill-opacity', '0.92');
  }
  for (var i = 0; i < connEls.length; i++) {
    var c = connEls[i];
    c.path.setAttribute('stroke-opacity', c.isExternal ? '0.3' : '0.5');
    c.path.setAttribute('stroke-width', '1.7');
    if (c.isDash) c.path.setAttribute('stroke-dasharray', '6 4');
    else c.path.removeAttribute('stroke-dasharray');
    c.path.style.animation = '';
    if (c.labelEl) c.labelEl.removeAttribute('opacity');
  }
  var allLabels = connGrp.querySelectorAll('.conn-label');
  for (var li = 0; li < allLabels.length; li++) {
    allLabels[li].removeAttribute('opacity');
  }
  tooltip.classList.remove('show');
}

function posTooltip(e) {
  var tw = 240, th = 110, vw = window.innerWidth, vh = window.innerHeight;
  tooltip.style.left = (e.clientX + 18 + tw > vw ? e.clientX - tw - 10 : e.clientX + 18) + 'px';
  tooltip.style.top  = (e.clientY - 14 + th > vh ? e.clientY - th - 10 : e.clientY - 14) + 'px';
}

// ─── Legend ───────────────────────────────────────────────────────────────────
var legEl = document.getElementById('legend');
for (var catKey in CATS) {
  if (!Object.prototype.hasOwnProperty.call(CATS, catKey)) continue;
  var legCat = CATS[catKey];
  var row = document.createElement('div');
  row.className = 'leg-row';
  var sw = document.createElement('div');
  sw.className = 'swatch';
  sw.style.background = legCat.color;
  row.appendChild(sw);
  row.appendChild(document.createTextNode(legCat.label));
  legEl.appendChild(row);
}

// ─── Zoom + pan ───────────────────────────────────────────────────────────────
var scale = 1, tx = 0, ty = 0, dragging = false, dragX = 0, dragY = 0;

function applyTransform() {
  canvasGrp.setAttribute('transform', 'translate(' + tx + ',' + ty + ') scale(' + scale + ')');
}

// Initial fit: diagram spans x 15..1135, y 65..655
var DX = 15, DY = 58, DW = 1120, DH = 597;
var VW = window.innerWidth, VH = window.innerHeight;
scale = Math.min((VW - 60) / DW, (VH - 80) / DH) * 0.95;
tx = (VW - DW * scale) / 2 - DX * scale;
ty = (VH - DH * scale) / 2 - DY * scale;
applyTransform();

mainSvg.addEventListener('wheel', function(e) {
  e.preventDefault();
  var factor = e.deltaY > 0 ? 0.88 : 1.12;
  var newScale = Math.min(Math.max(scale * factor, 0.2), 6);
  tx = e.clientX - (e.clientX - tx) * (newScale / scale);
  ty = e.clientY - (e.clientY - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

mainSvg.addEventListener('mousedown', function(e) {
  if (e.target.closest && e.target.closest('[data-id]')) return;
  dragging = true;
  dragX = e.clientX;
  dragY = e.clientY;
  mainSvg.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  tx += e.clientX - dragX;
  ty += e.clientY - dragY;
  dragX = e.clientX;
  dragY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', function() {
  dragging = false;
  mainSvg.style.cursor = 'grab';
});

})();
</script>
</body>
