// ─── SVG namespace helper ─────────────────────────────────────────────────────
var SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  var el = document.createElementNS(SVG_NS, tag);
  if (attrs) {
    for (var k in attrs) {
      if (Object.prototype.hasOwnProperty.call(attrs, k)) el.setAttribute(k, attrs[k]);
    }
  }
  return el;
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgba(hex, a) {
  var c = hexToRgb(hex);
  return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')';
}

// ─── Orthogonal path builder ──────────────────────────────────────────────────
// Same-row:
//   - adjacent modules: direct straight segment
//   - non-adjacent modules: routed via assigned elbowY lane (staggered later)
// Cross-row:
//   - 3-segment elbow at pre-computed elbowY.
function makePath(p1, p2, elbowY) {
  if (Math.abs(p2.y - p1.y) < 30) {
    if (elbowY == null) return 'M'+p1.x+','+p1.y+' L'+p2.x+','+p2.y;
    return 'M'+p1.x+','+p1.y+' L'+p1.x+','+elbowY+' L'+p2.x+','+elbowY+' L'+p2.x+','+p2.y;
  }
  var ey = (elbowY != null) ? elbowY : (p1.y + p2.y) / 2;
  return 'M'+p1.x+','+p1.y+' L'+p1.x+','+ey+' L'+p2.x+','+ey+' L'+p2.x+','+p2.y;
}

// Label position: above the routing lane used by the path.
function labelPos(p1, p2, elbowY) {
  if (Math.abs(p2.y - p1.y) < 30) {
    if (elbowY == null) return { x:(p1.x+p2.x)/2, y:p1.y - 9 };
    return { x:(p1.x+p2.x)/2, y:elbowY - 9 };
  }
  var ey = (elbowY != null) ? elbowY : (p1.y + p2.y) / 2;
  return { x:(p1.x+p2.x)/2, y:ey - 9 };
}

// ─── Edge exit point from node rectangle ─────────────────────────────────────
function edgePt(mod, tx, ty) {
  var hw = mod.w/2+4, hh = mod.h/2+4;
  var dx = tx-mod.cx, dy = ty-mod.cy;
  var L = Math.sqrt(dx*dx+dy*dy) || 1;
  var sx = dx===0 ? 1e9 : Math.abs(hw/dx);
  var sy = dy===0 ? 1e9 : Math.abs(hh/dy);
  var s = Math.min(sx, sy);
  return { x: mod.cx+dx*s, y: mod.cy+dy*s };
}

    mkr.appendChild(svgEl('path', { d:'M0,0 L0,6 L8,3 z', fill:col }));
    defs.appendChild(mkr);
  });
}

// ─── Ambient glow blobs ───────────────────────────────────────────────────────
var glowBlobs = [
  { cx:1005, cy:285, rx:290, ry:120, color:'#10B981' },
  { cx:585,  cy:455, rx:260, ry:115, color:'#8B5CF6' },
  { cx:1450, cy:370, rx:200, ry:180, color:'#EF4444' },
  { cx:355,  cy:110, rx:195, ry:68,  color:'#3B82F6' },
  { cx:1200, cy:110, rx:265, ry:65,  color:'#94A3B8' }
];
glowBlobs.forEach(function(gb, gi) {
  var gid = 'glow'+gi;
  var rg = svgEl('radialGradient', { id:gid, cx:'50%', cy:'50%', r:'50%' });
  var s0 = svgEl('stop', { offset:'0%' }); s0.setAttribute('stop-color', rgba(gb.color,0.08));
  var s1 = svgEl('stop', { offset:'100%' }); s1.setAttribute('stop-color', rgba(gb.color,0));
  rg.appendChild(s0); rg.appendChild(s1); defs.appendChild(rg);
  glowsGrp.appendChild(svgEl('ellipse',
    { cx:gb.cx, cy:gb.cy, rx:gb.rx, ry:gb.ry, fill:'url(#'+gid+')' }));
});

// ─── Zone labels ──────────────────────────────────────────────────────────────
var zoneLabels = [
  { text:'AMAZON INTEGRATION',  x:68,   y:58,  color:'#3B82F6' },
  { text:'CORE / BASE',          x:862,  y:58,  color:'#94A3B8' },
  { text:'PROCUREMENT',          x:68,   y:228, color:'#F97316' },
  { text:'OPERATIONS HUB',       x:708,  y:228, color:'#10B981' },
  { text:'FINANCE',              x:1362, y:228, color:'#EF4444' },
  { text:'MANUFACTURING & QC',   x:300,  y:400, color:'#8B5CF6' },
  { text:'FINANCIAL TOOLS',      x:1140, y:400, color:'#EF4444' }
];
zoneLabels.forEach(function(zl) {
  var zt = svgEl('text', {
    x:zl.x, y:zl.y,
    'font-family':"'Segoe UI',system-ui,sans-serif",
    'font-size':'8', 'font-weight':'700', 'letter-spacing':'0.16em',
    fill:rgba(zl.color, 0.45), 'pointer-events':'none'
  });
  zt.textContent = zl.text;
  zlabelGrp.appendChild(zt);
});

// ─── Staggered-lane routing pre-computation ──────────────────────────────────
//
//  Rows:        R1=110   R2=285   R3=455   R4=620
//  Node clearance: R1 bottom≈145  R2 top≈257  R2 bottom≈313  R3 top≈428  R3 bottom≈482  R4 top≈590
//  Corridors (safe ranges):
//    C12: [150, 257]   C23: [318, 428]   C34: [487, 590]
//
//  Lane strategy — each row-pair gets its own Y band INSIDE the corridor:
//    R1↔R2 (adjacent):  baseY=203, lane=8  → middle of C12
//    R1↔R3 (skip 1):    baseY=165, lane=5  → top quarter of C12 (clear of R1 bottom ~145)
//    R1↔R4 (skip 2):    baseY=160, lane=1  → top quarter of C12 (clear of R1 bottom ~145)
//    R2↔R3 (adjacent):  baseY=373, lane=8  → middle of C23
//    R2↔R4 (skip 1):    baseY=348, lane=8  → top quarter of C23 (clear of R2 bottom ~313)
//    R3↔R4 (adjacent):  baseY=537, lane=10 → middle of C34
//
var SNAP_ROWS = [110, 285, 455, 620];
function snapRow(y) {
  var b = SNAP_ROWS[0];
  SNAP_ROWS.forEach(function(r){ if (Math.abs(r-y) < Math.abs(b-y)) b=r; });
  return b;
}
var PAIR_CFG = {
  '110_285': { baseY:203, lane:8  },
  '110_455': { baseY:165, lane:5  },
  '110_620': { baseY:160, lane:1  },
  '285_455': { baseY:373, lane:8  },
  '285_620': { baseY:348, lane:8  },
  '455_620': { baseY:537, lane:10 }
};
var SAME_ROW_CFG = {
  '110': { baseY:82,  lane:8  },
  '285': { baseY:255, lane:7  },
  '455': { baseY:485, lane:7  },
  '620': { baseY:648, lane:6  }
};

// Pass 1 — compute p1, p2 for every connection (skip top-highway routes)
var connPts = CONNS.map(function(conn) {
  var fm = modMap[conn.from], tm = modMap[conn.to];
  if (!fm || !tm) return null;
  if (conn.route === 'top') {
    return { topRoute: true, fm: fm, tm: tm, rhs: null };
  }
  var isSameRow = Math.abs(tm.cy - fm.cy) < 30;
  var centerDx = Math.abs(tm.cx - fm.cx);
  // Adjacent same-row modules should stay direct (no arc/lane).
  var sameRowDirect = isSameRow && centerDx <= 240;
  return {
    fm: fm, tm: tm,
    p1: edgePt(fm, tm.cx, tm.cy),
    p2: edgePt(tm, fm.cx, fm.cy),
    elbowY: null,
    sameRowDirect: sameRowDirect
  };
});

// Pass 2 — group cross-row connections by row-pair and assign staggered elbowY
//          + group non-adjacent same-row connections by row and assign lanes
//          (top-highway connections are excluded from this pass)
var pairGroups = {};
var sameRowGroups = {};
connPts.forEach(function(cp, ci) {
  if (!cp || cp.topRoute) return;              // skip top-highway
  if (Math.abs(cp.p2.y - cp.p1.y) < 30) {
    if (cp.sameRowDirect) return;
    var sr = snapRow(cp.p1.y);
    var sk = String(sr);
    if (!sameRowGroups[sk]) sameRowGroups[sk] = [];
    sameRowGroups[sk].push(ci);
    return;
  }
  var r1 = snapRow(cp.p1.y), r2 = snapRow(cp.p2.y);
  var key = Math.min(r1,r2) + '_' + Math.max(r1,r2);
  if (!pairGroups[key]) pairGroups[key] = [];
  pairGroups[key].push(ci);
});

Object.keys(pairGroups).forEach(function(key) {
  var cfg = PAIR_CFG[key];
  if (!cfg) return;
  var idxs = pairGroups[key];
  // Sort by horizontal centre so adjacent connections get adjacent lanes → fewest crossings
  idxs.sort(function(a, b) {
    var ca = (connPts[a].p1.x + connPts[a].p2.x) / 2;
    var cb = (connPts[b].p1.x + connPts[b].p2.x) / 2;
    return ca - cb;
  });
  var n = idxs.length;
  idxs.forEach(function(ci, pos) {
    connPts[ci].elbowY = cfg.baseY + (pos - (n - 1) / 2) * cfg.lane;
  });
});

Object.keys(sameRowGroups).forEach(function(key) {
  var cfg = SAME_ROW_CFG[key];
  if (!cfg) return;
  var idxs = sameRowGroups[key];
  idxs.sort(function(a, b) {
    var ca = (connPts[a].p1.x + connPts[a].p2.x) / 2;
    var cb = (connPts[b].p1.x + connPts[b].p2.x) / 2;
    return ca - cb;
  });
  var n = idxs.length;
  idxs.forEach(function(ci, pos) {
    connPts[ci].elbowY = cfg.baseY + (pos - (n - 1) / 2) * cfg.lane;
  });
});

// Pass 3 — assign top-highway lanes + right-side ingress lanes to route:'top' connections.
//          These lanes sit ABOVE row 1, then approach target modules from the RIGHT edge.
var TOP_BASE = 76;
var TOP_STEP = 9;
var RHS_BASE = 1562;
var RHS_STEP = 9;
var topRouteIdxs = [];
connPts.forEach(function(cp, ci) {
  if (cp && cp.topRoute) topRouteIdxs.push(ci);
});
topRouteIdxs.sort(function(a, b) {
  var da = Math.abs(connPts[a].tm.cy - connPts[a].fm.cy);
  var db = Math.abs(connPts[b].tm.cy - connPts[b].fm.cy);
  return db - da;
});
topRouteIdxs.forEach(function(ci, pos) {
  connPts[ci].topY = TOP_BASE - pos * TOP_STEP;
  connPts[ci].rhs = RHS_BASE + pos * RHS_STEP;
});

// ─── Build connections ────────────────────────────────────────────────────────
var connEls = [];

CONNS.forEach(function(conn, ci) {
  var cp = connPts[ci];
  if (!cp) return;
  var fm = modMap[conn.from];
  var col2 = CATS[fm.cat].color;
  var isDash = conn.style === 'dashed' || !!fm.external;

  var pathD, lp;
  if (cp.topRoute) {
    // Top highway + right ingress:
    // source top edge → top lane → right-side lane → target row → target RIGHT edge.
    var topY = cp.topY;
    var rhs = cp.rhs;
    var tm = cp.tm;
    pathD = 'M'+fm.cx+','+(fm.cy-fm.h/2)+
            ' L'+fm.cx+','+topY+
            ' L'+rhs+','+topY+
            ' L'+rhs+','+tm.cy+
            ' L'+(tm.cx+tm.w/2)+','+tm.cy;
    lp = { x: (fm.cx + rhs) / 2, y: topY - 9, anchor: 'middle' };
  } else {
    var p1 = cp.p1, p2 = cp.p2, ey = cp.elbowY;
    pathD = makePath(p1, p2, ey);
    lp = labelPos(p1, p2, ey);
  }

  var pathEl = svgEl('path', {
    d: pathD,
    fill:'none', stroke:col2, 'stroke-width':'1.7',
    'stroke-opacity': fm.external ? '0.3' : (cp.topRoute ? '0.6' : '0.5'),
    'marker-end':'url(#arr-'+fm.cat+')'
  });
  if (isDash) pathEl.setAttribute('stroke-dasharray','6 4');
  connGrp.appendChild(pathEl);

  var labelEl = null;
  if (conn.label) {
    labelEl = svgEl('text', {
      x: lp.x, y: lp.y,
      'text-anchor': lp.anchor || 'middle', 'dominant-baseline':'middle',
      'font-family':"'Segoe UI',system-ui,sans-serif",
      'font-size':'8', 'font-weight':'600',
      fill:rgba(col2,0.55), 'pointer-events':'none', 'class':'conn-label'
    });
    labelEl.textContent = conn.label;
    connGrp.appendChild(labelEl);
  }
  connEls.push({ path:pathEl, labelEl:labelEl, from:conn.from, to:conn.to,
    catId:fm.cat, color:col2, isDash:isDash, isExternal:!!fm.external });
});

// ─── Build nodes ─────────────────────────────────────────────────────────────
var nodeEls = {};

MODS.forEach(function(mod) {
  var cat = CATS[mod.cat], col3 = cat.color;
  var hw = mod.w/2, hh = mod.h/2;
  var grp = svgEl('g', { 'data-id':mod.id });
  grp.setAttribute('transform','translate('+mod.cx+','+mod.cy+')');
  grp.style.cursor = 'pointer';

  if (mod.external) {
    var er = svgEl('rect', {
      x:-hw, y:-hh, width:mod.w, height:mod.h, rx:'10', ry:'10',
      fill:rgba(col3,0.07), stroke:col3, 'stroke-width':'1',
      'stroke-dasharray':'4 3', 'stroke-opacity':'0.4'
    });
    grp.appendChild(er);
    var lines = mod.name.split('\n'), lh = 15;
    var sy = lines.length > 1 ? -(lh*(lines.length-1))/2 : 0;
    lines.forEach(function(ln, li) {
      var lt = svgEl('text', {
        x:'0', y: sy+li*lh,
        'text-anchor':'middle', 'dominant-baseline':'middle',
        'font-family':"'Segoe UI',system-ui,sans-serif",
        'font-size': li===0 ? '10.5' : '9.5',
        'font-weight': li===0 ? '700' : '500',
        fill:rgba(col3,0.8), 'pointer-events':'none'
      });
      lt.textContent = ln;
      grp.appendChild(lt);
    });
    nodeGrp.appendChild(grp);

  } else {
    if (mod.big) {
      grp.appendChild(svgEl('rect', {
        x:-(hw+8), y:-(hh+8), width:mod.w+16, height:mod.h+16,
        rx:'20', ry:'20', fill:rgba(col3,0.10), stroke:'none'
      }));
    }
    var bg = svgEl('rect', {
      x:-hw, y:-hh, width:mod.w, height:mod.h,
      rx: mod.big ? '13' : '10', ry: mod.big ? '13' : '10',
      fill:rgba(col3,0.18), stroke:col3,
      'stroke-width': mod.big ? '1.8' : '1.3',
      'stroke-opacity': mod.big ? '0.75' : '0.5'
    });
    grp.appendChild(bg);
    grp.appendChild(svgEl('rect', {
      x:-hw+1, y:-hh+7, width:'3.5', height:mod.h-14,
      rx:'1.75', ry:'1.75', fill:col3, 'fill-opacity':'0.9', 'pointer-events':'none'
    }));
    var lbl = svgEl('text', {
      x:'5', y:'0.5', 'text-anchor':'middle', 'dominant-baseline':'middle',
      'font-family':"'Segoe UI',system-ui,sans-serif",
      'font-size': mod.big ? '12.5' : '11.5',
      'font-weight': mod.big ? '700' : '600',
      fill:'#ffffff', 'fill-opacity':'0.92', 'pointer-events':'none'
    });
    lbl.textContent = mod.name;
    grp.appendChild(lbl);
    nodeGrp.appendChild(grp);
    nodeEls[mod.id] = { grp:grp, bg:bg, lbl:lbl };
  }

  (function(mid) {
    grp.addEventListener('mouseenter', function(e) { onHover(mid, e); });
    grp.addEventListener('mouseleave', offHover);
    grp.addEventListener('mousemove', posTooltip);
  })(mod.id);
});

// ─── Hover ────────────────────────────────────────────────────────────────────
function onHover(id, e) {
  var linked = {}; linked[id] = true;
  var litConns = [];
  connEls.forEach(function(c) {
    if (c.from===id || c.to===id) {
      linked[c.from]=true; linked[c.to]=true; litConns.push(c);
    }
  });
  for (var nid in nodeEls) {
    if (!Object.prototype.hasOwnProperty.call(nodeEls, nid)) continue;
    var ne = nodeEls[nid];
    var isMain = nid===id, isLinked = !!linked[nid];
    ne.bg.setAttribute('fill-opacity', isMain ? '0.5' : isLinked ? '0.28' : '0.04');
    ne.bg.setAttribute('stroke-opacity', isLinked ? '1' : '0.08');
    ne.lbl.setAttribute('fill-opacity', isLinked ? '1' : '0.1');
  }
  connGrp.querySelectorAll('.conn-label').forEach(function(l) {
    l.setAttribute('opacity','0.08');
  });
  connEls.forEach(function(c) {
    var isLit = litConns.indexOf(c) !== -1;
    if (isLit) {
      c.path.setAttribute('stroke-opacity','1');
      c.path.setAttribute('stroke-width','2.8');
      c.path.setAttribute('stroke-dasharray','10 6');
      c.path.style.animation = 'flow 0.85s linear infinite';
      if (c.labelEl) c.labelEl.setAttribute('opacity','1');
    } else {
      c.path.setAttribute('stroke-opacity','0.04');
      c.path.setAttribute('stroke-width','1');
      c.path.style.animation = '';
    }
  });
  var m = modMap[id], cat = CATS[m.cat];
  ttBadge.textContent = cat.label;
  ttBadge.style.color = cat.color;
  ttName.textContent = m.name.replace('\n',' ');
  ttDesc.textContent = m.desc;
  tooltip.classList.add('show');
  posTooltip(e);
}

function offHover() {
  for (var nid in nodeEls) {
    if (!Object.prototype.hasOwnProperty.call(nodeEls, nid)) continue;
    var ne = nodeEls[nid], nm = modMap[nid];
    ne.bg.setAttribute('fill-opacity','0.18');
    ne.bg.setAttribute('stroke-opacity', nm.big ? '0.75' : '0.5');
    ne.lbl.setAttribute('fill-opacity','0.92');
  }
  connEls.forEach(function(c) {
    c.path.setAttribute('stroke-opacity', c.isExternal ? '0.3' : '0.5');
    c.path.setAttribute('stroke-width','1.7');
    if (c.isDash) c.path.setAttribute('stroke-dasharray','6 4');
    else c.path.removeAttribute('stroke-dasharray');
    c.path.style.animation = '';
    if (c.labelEl) c.labelEl.removeAttribute('opacity');
  });
  connGrp.querySelectorAll('.conn-label').forEach(function(l) {
    l.removeAttribute('opacity');
  });
  tooltip.classList.remove('show');
}

function posTooltip(e) {
  var tw=280, th=130, vw=window.innerWidth, vh=window.innerHeight;
  tooltip.style.left = (e.clientX+18+tw>vw ? e.clientX-tw-10 : e.clientX+18)+'px';
  tooltip.style.top  = (e.clientY-14+th>vh ? e.clientY-th-10 : e.clientY-14)+'px';
}

// ─── Legend ───────────────────────────────────────────────────────────────────
var legEl = document.getElementById('legend');
for (var catKey in CATS) {
  if (!Object.prototype.hasOwnProperty.call(CATS, catKey)) continue;
  var lc = CATS[catKey];
  var row = document.createElement('div'); row.className='leg-row';
  var sw = document.createElement('div'); sw.className='swatch'; sw.style.background=lc.color;
  row.appendChild(sw); row.appendChild(document.createTextNode(lc.label));
  legEl.appendChild(row);
}

// ─── Zoom + pan ───────────────────────────────────────────────────────────────
var scale=1, tx=0, ty=0, dragging=false, dragX=0, dragY=0;

function applyTransform() {
  canvasGrp.setAttribute('transform','translate('+tx+','+ty+') scale('+scale+')');
}

// Content bounds — x 42..1535, y 40..660
var DX=42, DY=40, DW=1493, DH=640;

function fitDiagram() {
  var vw=window.innerWidth, vh=window.innerHeight;
  if (vw<10||vh<10) return false;
  scale = Math.min((vw-60)/DW, (vh-80)/DH) * 0.95;
  tx = (vw-DW*scale)/2 - DX*scale;
  ty = (vh-DH*scale)/2 - DY*scale;
  applyTransform();
  return true;
}

if (!fitDiagram()) {
  function onInitResize() { if (fitDiagram()) window.removeEventListener('resize',onInitResize); }
  window.addEventListener('resize', onInitResize);
}

mainSvg.addEventListener('wheel', function(e) {
  e.preventDefault();
  var factor = e.deltaY>0 ? 0.88 : 1.12;
  var ns = Math.min(Math.max(scale*factor, 0.2), 6);
  tx = e.clientX-(e.clientX-tx)*(ns/scale);
  ty = e.clientY-(e.clientY-ty)*(ns/scale);
  scale = ns; applyTransform();
}, { passive:false });

mainSvg.addEventListener('mousedown', function(e) {
  if (e.target.closest && e.target.closest('[data-id]')) return;
  dragging=true; dragX=e.clientX; dragY=e.clientY;
  mainSvg.style.cursor='grabbing';
});
window.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  tx+=e.clientX-dragX; ty+=e.clientY-dragY;
  dragX=e.clientX; dragY=e.clientY; applyTransform();
});
window.addEventListener('mouseup', function() { dragging=false; mainSvg.style.cursor='grab'; });

})();
</script>
